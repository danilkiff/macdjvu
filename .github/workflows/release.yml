name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Install DjVuLibre
        run: brew install djvulibre

      - name: Test
        run: swift test

      - name: Vendor DjVuLibre tools
        run: bash scripts/vendor-djvulibre.sh

      - name: Bundle .app
        run: bash bundle.sh

      - name: Verify no Homebrew paths in bundle
        run: |
          ! otool -L MacDjVu.app/Contents/Helpers/bin/* MacDjVu.app/Contents/Helpers/lib/* \
            | grep /opt/homebrew

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: MacDjVu.dmg
          generate_release_notes: true
